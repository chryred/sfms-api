name: CI

# ⚠️ 이 파일은 "테스트용 GitHub repo" 전용이다. 운영 CI는 사내 Bamboo(bamboo-specs/bamboo.yml).
#    로직 중복을 피하려 양쪽 모두 ci/*.sh 를 호출만 한다. 불필요하면 이 파일은 삭제 가능.

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  test-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 21 (Temurin)        # DESIGN §8.3
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle (with cache)
        uses: gradle/actions/setup-gradle@v4

      - name: Test
        run: ./ci/test.sh                    # 게이트 ① — Bamboo와 동일 스크립트

      - name: Install Trivy                  # 액션 버전 의존 회피 — 공식 설치 스크립트
        run: curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

      - name: CVE scan
        run: ./ci/scan.sh                    # 게이트 ③ — Bamboo와 동일 스크립트
